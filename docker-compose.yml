services:
    flight:
        build:
            context: .
            dockerfile: Dockerfile
        working_dir: /var/www/html
        environment:
            docker: "true"
        ports:
            - "8080:80"
        depends_on:
            - postgres

    postgres:
        image: postgres:15-alpine
        environment:
            POSTGRES_DB: mp-wd-0326
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: post
        ports:
            - "5433:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data

volumes:
    pgdata:

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Backoffice Édition</title>
    
    <!-- Polices : Playfair Display pour l'élégance éditoriale, Inter pour la lisibilité de l'interface -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f0f4f8;
            /* Arrière-plan subtil : un mélange de couleurs douces évoquant l'encre et le papier */
            background-image: 
                radial-gradient(at 0% 0%, hsla(210, 100%, 95%, 1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(220, 30%, 85%, 1) 0px, transparent 50%);
            color: #1e293b;
        }

        /* Conteneur principal */
        .login-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 2rem;
        }

        /* La carte de connexion avec un léger effet Glassmorphism */
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 
                0 4px 6px -1px rgba(0, 0, 0, 0.05),
                0 20px 25px -5px rgba(0, 0, 0, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 1);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* En-tête (Logo et Titre) */
        .brand-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }
        
        .logo span {
            color: #3b82f6; /* Point bleu moderne */
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.1rem;
            color: #64748b;
        }

        /* Formulaire */
        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            color: #0f172a;
            transition: all 0.3s ease;
            outline: none;
        }

        /* Effet au focus de l'input */
        .input-group input:focus {
            background-color: #ffffff;
            border-color: #94a3b8;
            box-shadow: 0 0 0 4px rgba(241, 245, 249, 1);
        }

        .input-group input::placeholder {
            color: #cbd5e1;
        }

        /* Options annexes (Se souvenir de moi / Mdp oublié) */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            font-size: 0.85rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #475569;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            appearance: none;
            width: 16px;
            height: 16px;
            border: 2px solid #cbd5e1;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .remember-me input[type="checkbox"]:checked {
            background-color: #0f172a;
            border-color: #0f172a;
        }

        .remember-me input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 10px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .forgot-password {
            color: #64748b;
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-password:hover {
            color: #0f172a;
            text-decoration: underline;
        }

        /* Bouton de connexion */
        .btn-submit {
            width: 100%;
            padding: 0.85rem;
            background-color: #0f172a; /* Bouton très sombre, presque noir */
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-submit:hover {
            background-color: #1e293b;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.2);
        }

        /* Footer de la page */
        .login-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        /* Petit trait décoratif sous le logo */
        .divider {
            width: 40px;
            height: 2px;
            background-color: #cbd5e1;
            margin: 1.5rem auto;
        }

    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            
            <div class="brand-header">
                <div class="logo">Backoffice<span>.</span></div>
                <div class="subtitle">Espace Rédacteurs</div>
                <div class="divider"></div>
            </div>

            <form action="backoffice.html">
                <div class="input-group">
                    <label for="email">Identifiant éditorial</label>
                    <input type="email" id="email" placeholder="prenom.nom@lecho.fr" required autocomplete="email">
                </div>

                <div class="input-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox">
                        <span>Rester connecté</span>
                    </label>
                    <a href="#" class="forgot-password">Mot de passe oublié ?</a>
                </div>

                <button type="submit" class="btn-submit">
                    Accéder au Desk
                    <!-- Petite flèche discrète en SVG (inline) -->
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>

        </div>
        
        <div class="login-footer">
            &copy; 2023 Éditions Backoffice. Accès réservé au personnel autorisé.
        </div>
    </div>

</body>
</html>
